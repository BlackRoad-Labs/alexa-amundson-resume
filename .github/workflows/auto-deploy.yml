name: Auto Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest
    if: vars.CLOUDFLARE_ENABLED == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Deploy static site to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=${{ github.event.repository.name }}

  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    if: vars.VERCEL_ENABLED == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '20'

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel
        run: vercel deploy --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-railway:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    if: vars.RAILWAY_ENABLED == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service ${{ github.event.repository.name }}
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

  health-check:
    name: Health Check
    needs: [deploy-cloudflare, deploy-vercel, deploy-railway]
    if: |
      always() &&
      (needs.deploy-cloudflare.result == 'success' ||
       needs.deploy-vercel.result == 'success' ||
       needs.deploy-railway.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Wait for deployment propagation
        run: sleep 30

      - name: Check deployment health
        if: vars.DEPLOY_URL != ''
        run: |
          URL="${{ vars.DEPLOY_URL }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL" || echo "000")
          echo "Health check status: $STATUS"
          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 400 ]; then
            echo "::error::Health check failed with status $STATUS"
            exit 1
          fi
          echo "Deployment is healthy."
