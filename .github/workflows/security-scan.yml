name: Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  secret-scan:
    name: Secret & Sensitive Data Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Scan for secrets
        run: |
          echo "Scanning for potential secrets and sensitive data..."
          FOUND=0

          # Check for common secret patterns
          for pattern in \
            'AKIA[0-9A-Z]{16}' \
            'AIza[0-9A-Za-z\\-_]{35}' \
            'sk-[0-9a-zA-Z]{48}' \
            'ghp_[0-9a-zA-Z]{36}' \
            'xox[baprs]-[0-9a-zA-Z]{10,}' \
            '-----BEGIN (RSA |EC )?PRIVATE KEY-----'; do
            if grep -rPl "$pattern" --include='*.md' --include='*.yml' --include='*.yaml' . 2>/dev/null; then
              echo "WARNING: Potential secret found matching pattern: $pattern"
              FOUND=1
            fi
          done

          if [ "$FOUND" -eq 1 ]; then
            echo "::error::Potential secrets detected in repository files"
            exit 1
          fi

          echo "No secrets detected."

  link-check:
    name: Validate Markdown Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check markdown file integrity
        run: |
          echo "Validating markdown files..."
          ERRORS=0

          for file in *.md; do
            if [ -f "$file" ]; then
              # Check file is valid UTF-8
              if ! iconv -f UTF-8 -t UTF-8 "$file" > /dev/null 2>&1; then
                echo "::error file=$file::Invalid UTF-8 encoding"
                ERRORS=$((ERRORS + 1))
              fi

              # Check file is not empty
              if [ ! -s "$file" ]; then
                echo "::error file=$file::File is empty"
                ERRORS=$((ERRORS + 1))
              fi

              echo "Validated: $file ($(wc -l < "$file") lines, $(wc -w < "$file") words)"
            fi
          done

          if [ "$ERRORS" -gt 0 ]; then
            echo "::error::Found $ERRORS validation errors"
            exit 1
          fi

          echo "All markdown files validated successfully."

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Dependency Review
        uses: actions/dependency-review-action@da24556b548a50705dd671f47852072ea4c105d9 # v4.7.1
