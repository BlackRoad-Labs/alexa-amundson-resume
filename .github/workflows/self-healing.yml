name: Self-Healing

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Deploy"]
    types: [completed]

permissions:
  contents: read
  issues: write

jobs:
  monitor:
    name: Monitor Deployment
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Check deployment health
        id: health
        run: |
          if [ -z "${{ vars.DEPLOY_URL }}" ]; then
            echo "status=skip" >> $GITHUB_OUTPUT
            echo "No DEPLOY_URL configured, skipping health check."
            exit 0
          fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ vars.DEPLOY_URL }}" || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Health check returned: $STATUS"

      - name: Report status
        if: steps.health.outputs.status != 'skip'
        run: |
          STATUS="${{ steps.health.outputs.status }}"
          if [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 400 ]; then
            echo "Deployment is healthy (HTTP $STATUS)"
          else
            echo "::warning::Deployment health check returned HTTP $STATUS"
          fi

      - name: Create issue on failure
        if: |
          steps.health.outputs.status != 'skip' &&
          steps.health.outputs.status != '200' &&
          steps.health.outputs.status != '301' &&
          steps.health.outputs.status != '302'
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          script: |
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deployment,auto-generated'
            });

            if (issues.data.length > 0) {
              console.log('Open deployment issue already exists, skipping.');
              return;
            }

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Self-Healing: Deployment Health Check Failed',
              body: [
                'Deployment health check failed.',
                '',
                '- **Status:** ${{ steps.health.outputs.status }}',
                '- **URL:** ${{ vars.DEPLOY_URL }}',
                '- **Workflow Run:** ' + context.runId,
                '- **Time:** ' + new Date().toISOString()
              ].join('\n'),
              labels: ['bug', 'deployment', 'auto-generated']
            });

  validate-content:
    name: Validate Repository Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Validate markdown files exist
        run: |
          REQUIRED_FILES=(
            "README.md"
            "alexa-amundson-resume.md"
            "alexa-amundson-one-pager.md"
            "alexa-amundson-resume-enhanced.md"
            "alexa-amundson-resume-executive.md"
            "alexa-amundson-resume-master.md"
            "alexa-amundson-resume-ultimate.md"
            "alexa-amundson-testimonials.md"
            "alexa-amundson-white-papers.md"
          )

          MISSING=0
          for file in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$file" ]; then
              echo "::error::Required file missing: $file"
              MISSING=$((MISSING + 1))
            else
              echo "Found: $file ($(wc -w < "$file") words)"
            fi
          done

          if [ "$MISSING" -gt 0 ]; then
            echo "::error::$MISSING required files are missing"
            exit 1
          fi

          echo "All required files present."
